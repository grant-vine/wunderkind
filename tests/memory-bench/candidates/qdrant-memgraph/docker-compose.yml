services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/collections"]
      interval: 5s
      timeout: 3s
      retries: 20

  memgraph:
    image: memgraph/memgraph:latest
    ports:
      - "7688:7687"
    command: ["--log-level=WARNING"]

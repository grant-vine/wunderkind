services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
    volumes:
      - qdrant_neo4j_eval_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    ports:
      - "7475:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: none
    volumes:
      - neo4j_community_eval_data:/data

volumes:
  qdrant_neo4j_eval_data:
  neo4j_community_eval_data:

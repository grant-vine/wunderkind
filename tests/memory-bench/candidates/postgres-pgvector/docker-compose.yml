services:
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: wunderkind-postgres-pgvector-eval
    environment:
      POSTGRES_DB: wunderkind_eval
      POSTGRES_USER: wunderkind
      POSTGRES_PASSWORD: wunderkind
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wunderkind -d wunderkind_eval"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_pgvector_eval_data:/var/lib/postgresql/data

volumes:
  postgres_pgvector_eval_data:
